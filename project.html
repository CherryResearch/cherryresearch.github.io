<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Cherry Research project details and README snapshots for shared tools, interfaces, and experiments.">
  <meta name="keywords" content="project, details, innovation, technology, research, Cherry Research">
  <meta name="author" content="Cherry Research">
  <meta name="theme-color" content="#b1163a">
  <title>Project Details - Cherry Research</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page-project">
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="container">
      <a class="brand" href="home.html" aria-label="Cherry Research home">
        <span class="brand-mark">
          <img src="favicon.svg" alt="" aria-hidden="true">
        </span>
        <span class="brand-text">
          <span class="brand-title">Cherry Research</span>
        </span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="home.html#about">About</a>
        <a href="showcase.html" aria-current="page">Showcase</a>
        <a href="lab-notes.html">Lab Notes</a>
        <a href="home.html#contact" class="nav-cta">Contact</a>
      </nav>
    </div>
  </header>

  <main id="main">
    <section class="page-hero">
      <div class="container">
        <h1 id="project-title">Loading...</h1>
        <p>A public project snapshot rendered from the current repository README.</p>
      </div>
    </section>

    <section class="section">
      <div class="project-detail-container" id="project-content">
        <p class="loading-message">Loading project details...</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-content">
      <div class="footer-brand">
        <span class="brand-mark">
          <img src="favicon.svg" alt="" aria-hidden="true">
        </span>
        <div>
          <p class="footer-title">Cherry Research</p>
        </div>
      </div>
      <div class="footer-links">
        <a href="home.html">Home</a>
        <a href="home.html#about">About</a>
        <a href="showcase.html">Showcase</a>
        <a href="home.html#contact">Contact</a>
      </div>
      <div class="footer-links footer-social">
        <a href="https://www.youtube.com/@CherryResearch" target="_blank" rel="noopener noreferrer">YouTube</a>
        <a href="https://bsky.app/profile/cherryresearch.bsky.social" target="_blank" rel="noopener noreferrer">Bluesky</a>
        <a href="https://github.com/CherryResearch" target="_blank" rel="noopener noreferrer">GitHub</a>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const fallbackProjects = {
      float: {
        id: 'float',
        title: 'float',
        date: '2026-04-17',
        tags: ['AI', 'Agent', 'Workspace', 'Local-first'],
        description: 'A user-controlled workspace and knowledge agent for working with AI through durable memory, tools, and personalization.',
        image: 'images/float-logo.png?v=transparent',
        imageFit: 'contain',
        readmeImage: 'images/float-logo.png?v=transparent',
        repoUrl: 'https://github.com/CherryResearch/float',
        readmeUrl: 'https://raw.githubusercontent.com/CherryResearch/float/main/README.md',
        defaultBranch: 'main'
      }
    };

    const yearEl = document.getElementById('year');
    if (yearEl) {
      yearEl.textContent = new Date().getFullYear();
    }
    if (window.marked) {
      marked.setOptions({ breaks: true, gfm: true, mangle: false, headerIds: false });
    }

    function renderMarkdown(input) {
      if (window.marked) {
        return marked.parse(input);
      }
      const escaped = input
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
      return escaped.replace(/\n/g, '<br>');
    }

    function parseGitHubRepoPath(repoUrl) {
      const match = /github\.com\/([^/]+\/[^/#?]+)/i.exec(repoUrl || '');
      return match ? match[1] : '';
    }

    function rewriteProjectLinks(container, project) {
      const repoPath = parseGitHubRepoPath(project.repoUrl);
      if (!repoPath) return;

      const branch = project.defaultBranch || 'main';
      const blobBase = `https://github.com/${repoPath}/blob/${branch}/`;
      const rawBase = `https://raw.githubusercontent.com/${repoPath}/${branch}/`;
      const isRelative = value => value && !/^(?:[a-z]+:)?\/\//i.test(value) && !value.startsWith('#') && !value.startsWith('mailto:') && !value.startsWith('data:');
      const cleanPath = value => value.replace(/^\.\//, '').replace(/^\/+/, '');

      container.querySelectorAll('a[href]').forEach(link => {
        const href = link.getAttribute('href');
        if (!isRelative(href)) return;
        link.setAttribute('href', `${blobBase}${cleanPath(href)}`);
        link.setAttribute('target', '_blank');
        link.setAttribute('rel', 'noopener noreferrer');
      });

      const siteImages = [project.image, project.readmeImage].filter(Boolean);
      container.querySelectorAll('img[src]').forEach(img => {
        const src = img.getAttribute('src');
        if (!isRelative(src)) return;
        if (siteImages.includes(src)) return;
        img.setAttribute('src', `${rawBase}${cleanPath(src)}`);
      });
    }

    function prepareReadmeMarkdown(readme, project) {
      if (!readme) return '';
      const replacement = project.readmeImage || project.image || '';
      if (!replacement) return readme;
      return readme.replace(
        /<img[^>]+alt="floatlogo_transparent"[^>]*>/i,
        `![float logo](${replacement})`
      );
    }

    async function loadProject() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const contentDiv = document.getElementById('project-content');
      const titleHeader = document.getElementById('project-title');

      if (!id) {
        titleHeader.textContent = 'Project Not Found';
        contentDiv.innerHTML = '<p class="error-message">Project ID not specified.</p>';
        return;
      }

      try {
        let project;
        try {
          const response = await fetch(`showcase/${id}.json`);
          if (!response.ok) {
            throw new Error(`Failed to fetch project: ${response.statusText}`);
          }
          project = await response.json();
        } catch (error) {
          project = fallbackProjects[id];
          if (!project) throw error;
        }

        titleHeader.textContent = project.title || 'Untitled Project';

        const initials = (project.title || 'CR')
          .split(' ')
          .slice(0, 2)
          .map(word => word[0])
          .join('')
          .toUpperCase();

        const metaParts = [project.date, project.category].filter(Boolean);
        const metaHtml = metaParts.length
          ? `<div class="project-meta">${metaParts.map(item => `<span>${item}</span>`).join('')}</div>`
          : '';

        const tagsHtml = Array.isArray(project.tags) && project.tags.length > 0
          ? `<div class="tag-container">${project.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}</div>`
          : '';
        const linksHtml = project.repoUrl
          ? `<div class="card-actions"><a href="${project.repoUrl}" class="text-link" target="_blank" rel="noopener noreferrer">View on GitHub &rarr;</a></div>`
          : '';

        let bodyHtml = project.content
          ? project.content
          : project.details
            ? `<p>${project.details}</p>`
            : '<p>No additional details are available yet.</p>';

        if (project.readmeUrl) {
          const readmeRes = await fetch(project.readmeUrl);
          if (!readmeRes.ok) {
            throw new Error(`Failed to fetch README: ${readmeRes.statusText}`);
          }
          const readme = await readmeRes.text();
          bodyHtml = renderMarkdown(prepareReadmeMarkdown(readme, project));
        }

        contentDiv.innerHTML = `
          <div class="project-hero">
            <div class="project-media ${project.image ? '' : 'is-missing'} ${project.imageFit === 'contain' ? 'project-media-contain' : ''}">
              ${project.image ? `<img src="${project.image}" alt="${project.title || 'Project image'}" loading="lazy" onerror="this.closest('.project-media').classList.add('is-missing');">` : ''}
              <div class="media-fallback" aria-hidden="true">${initials}</div>
            </div>
            <div class="project-summary">
              <p>${project.description || 'No description available.'}</p>
              ${metaHtml}
              ${tagsHtml}
              ${linksHtml}
            </div>
          </div>
          <div class="project-body">
            ${bodyHtml}
          </div>
        `;
        rewriteProjectLinks(contentDiv.querySelector('.project-body'), project);

      } catch (error) {
        console.error('Error loading project:', error);
        titleHeader.textContent = 'Error';
        contentDiv.innerHTML = '<p class="error-message">Failed to load project details. Please check the console for more information.</p>';
      }
    }

    document.addEventListener('DOMContentLoaded', loadProject);
  </script>
</body>
</html>
