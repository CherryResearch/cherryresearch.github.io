  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const fallbackPosts = {
      'introducing-float': {
        title: 'Introducing float',
        date: '2026-04-17',
        tags: ['float', 'intro', 'workspace'],
        readTime: '3 min read',
        content: '![float logo](images/float-logo.png?v=transparent)\n\nOur first and core project is float, a user-controlled workspace and knowledge agent for working with AI using durable memory, tools, and personalization. It is designed to run locally or through compatible servers, so people can choose their own balance of privacy, capability, and convenience. More than a single assistant, each instance of float is intended to be a persistent, inspectable system for observing, learning, and conducting real computer work over a long time horizon. float learns by both updating simple files and databases that humans can collaborate on and embedding memories. float is extensible with modules for custom tools and skills to connect to your working environment and other agents. It is still early and actively evolving, but the direction is stable: a system that you can live, work, or make with.'
      }
    };

    const yearEl = document.getElementById('year');
    if (yearEl) {
      yearEl.textContent = new Date().getFullYear();
    }
    if (window.marked) {
      marked.setOptions({ breaks: true, gfm: true, mangle: false, headerIds: false });
    }

    function parseFrontMatter(markdown) {
      const cleaned = markdown.replace(/^\uFEFF/, '');
      const fmRegex = /^---\r?\n([\s\S]+?)\r?\n---\r?\n([\s\S]*)$/;
      const match = fmRegex.exec(cleaned);
      if (!match) return { metadata: {}, content: markdown };
      const yaml = match[1].trim();
      const content = match[2];
      const metadata = {};
      yaml.split('\n').forEach(line => {
        const parts = line.split(':');
        const key = parts.shift();
        if (!key) return;
        let value = parts.join(':').trim();
        if (value.startsWith('[') && value.endsWith(']')) {
          try {
            value = JSON.parse(value);
          } catch (e) {
            value = [];
          }
        } else {
          value = value.replace(/^"|"$/g, '');
        }
        metadata[key.trim()] = value;
      });
      return { metadata, content };
    }

    function normalizeMarkdown(input) {
      if (!input) return '';
      const withEmbeds = input.replace(/!\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g, (match, target, alt) => {
        const cleaned = target.trim();
        const fileName = cleaned.replace(/^\.?\/*/, '');
        const isAbsolute = cleaned.startsWith('http://') || cleaned.startsWith('https://') || cleaned.startsWith('/') || cleaned.startsWith('./');
        const src = isAbsolute ? cleaned : `posts/${fileName}`;
        const altText = (alt || fileName).trim();
        return `![${altText}](${src})`;
      });
      return withEmbeds.replace(/\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g, (match, target, label) => {
        const cleaned = target.trim().replace(/\.md$/i, '');
        const text = (label || cleaned).trim();
        return `[${text}](post.html?post=${encodeURIComponent(cleaned)})`;
      });
    }

    function renderMarkdown(input) {
      if (window.marked) {
        return marked.parse(input);
      }
      const escaped = input
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
      return escaped.replace(/\n/g, '<br>');
    }

    async function loadPost() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('post');
      const contentEl = document.getElementById('post-content');
      const titleEl = document.getElementById('post-title');
      const metaEl = document.getElementById('post-meta');

      if (!slug) {
        contentEl.innerHTML = '<p class="error-message">Post not specified.</p>';
        return;
      }
      let metadata;
      let content;
      try {
        const res = await fetch(`posts/${slug}.md`);
        if (!res.ok) throw new Error('Post not found');
        const raw = await res.text();
        ({ metadata, content } = parseFrontMatter(raw));
      } catch (error) {
        console.error('Error loading post:', error);
        const fallback = fallbackPosts[slug];
        if (!fallback) {
          contentEl.innerHTML = '<p class="error-message">Failed to load post.</p>';
          return;
        }
        metadata = fallback;
        content = fallback.content;
      }

      titleEl.textContent = metadata.title || 'Untitled Post';
      const metaValues = [metadata.date, metadata.readTime].filter(Boolean);
      metaEl.innerHTML = metaValues.map(value => `<span>${value}</span>`).join('');
      contentEl.innerHTML = renderMarkdown(normalizeMarkdown(content));
      if (Array.isArray(metadata.tags) && metadata.tags.length > 0) {
        const tagsHtml = metadata.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
        const tagsContainer = document.createElement('div');
        tagsContainer.className = 'tag-container';
        tagsContainer.innerHTML = tagsHtml;
        contentEl.appendChild(tagsContainer);
      }
    }

    document.addEventListener('DOMContentLoaded', loadPost);
  </script>
