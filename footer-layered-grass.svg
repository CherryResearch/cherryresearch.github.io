<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 30" preserveAspectRatio="none">
  <defs>
    <filter id="subtleTexture">
      <feTurbulence type="fractalNoise" baseFrequency="0.05 0.2" numOctaves="2" result="turbulence"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.4  0 0 0 0 0.7  0 0 0 0 0.4  0 0 0 0.1 0" result="coloredTurbulence"/>
      <feComposite operator="in" in="coloredTurbulence" in2="SourceGraphic" result="textured"/>
      <feBlend in="SourceGraphic" in2="textured" mode="multiply"/>
    </filter>
  </defs>

  <!-- Back Layer (Darkest) -->
  <path d="M 0 30 
           Q 15 15, 30 20 
           T 60 18 
           T 90 22 
           L 100 30 Z" 
        fill="#4a7c4e" 
        style="filter: url(#subtleTexture);"/>
  
  <!-- Middle Layer -->
  <path d="M 0 30 
           Q 20 20, 40 25 
           T 70 22 
           T 100 28 Z" 
        fill="#6fbf74" 
        style="filter: url(#subtleTexture);"/>

  <!-- Front Layer (Lightest) -->
  <path d="M 0 30 
           Q 25 25, 50 28 
           T 80 26 
           L 100 30 Z" 
        fill="#8fcf8f" 
        style="filter: url(#subtleTexture);"/>
</svg> 